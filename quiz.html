<section class="hero-quiz">

    <div class="ornament-left"></div>
    <div class="ornament-right"></div>

    <h1>
        Uji Pengetahuanmu
    </h1>

    <p>
    Jawab 10 pertanyaan seputar Hayam Wuruk,
    Gajah Mada, dan kejayaan Majapahit untuk
    mengetahui gelarmu dalam kerajaan.
    </p>

</section>

<section class="quiz-wrapper">

    <div class="quiz-card">

        <div class="quiz-top">

            <span id="questionNumber">
                Pertanyaan 1 dari 10
            </span>

            <div class="progress-bar">
                <div class="progress-fill"
                id="progressFill"></div>
            </div>

        </div>

        <h2 id="questionText"></h2>

        <div id="options"
        class="options-container">
        </div>

        <div id="feedbackBox"></div>

        <button
        class="btn"
        id="nextBtn"
        style="display:none;">
            Soal Berikutnya
        </button>

    </div>

</section>

<div id="resultBox"></div>
<div id="badgeResult"></div>
